<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>violate — goals tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fff; --fg:#0a0a0a; --muted:#707070; --line:#ececec;
  --accent:#0a7d3a; --warn:#b03030; --hover:#f7f7f7; --soft:#fafafa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--fg);font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased}

header{border-bottom:1px solid var(--line);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:10}
.logo{font-weight:700;font-size:17px;letter-spacing:-.4px}
.logo small{color:var(--muted);font-weight:400;font-size:12px;margin-left:10px}
.nav{display:flex;gap:12px;font-size:13px;align-items:center}
.nav span{color:var(--muted);font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav a{color:var(--muted);text-decoration:none;cursor:pointer}.nav a:hover{color:var(--fg)}

main{max-width:1100px;margin:0 auto;padding:20px 24px 60px}

/* auth */
.auth-page{max-width:360px;margin:70px auto;padding:0 20px}
.auth-page h2{font-size:20px;margin-bottom:4px}
.auth-page p.sub{color:var(--muted);font-size:13px;margin-bottom:22px}
.auth-form{display:flex;flex-direction:column;gap:10px}
.auth-form input{padding:10px 12px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit}
.auth-form input:focus{outline:none;border-color:var(--fg)}
.auth-error{color:var(--warn);font-size:12px;min-height:16px}
.auth-divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;margin:4px 0}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--line)}
.auth-toggle{margin-top:14px;font-size:12px;color:var(--muted);text-align:center}
.auth-toggle a{color:var(--fg);font-weight:500;cursor:pointer}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 14px;border:1px solid var(--line);background:#fff;color:var(--fg);border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;width:100%}
.btn-google:hover{border-color:#aaa;background:var(--soft)}

/* buttons */
.btn{padding:9px 14px;border:1px solid var(--fg);background:var(--fg);color:#fff;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500}
.btn:hover{opacity:.88}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:#fff;color:var(--fg)}
.btn-sm{padding:5px 10px;font-size:12px}

/* add bar */
.add-bar{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.add-bar input[type=text]{flex:1;padding:9px 12px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit}
.add-bar input:focus{outline:none;border-color:var(--fg)}
.add-bar select{padding:9px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit;background:#fff;color:var(--fg)}
.notes-bar{margin-bottom:14px}
.notes-bar textarea{width:100%;padding:8px 12px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit;resize:vertical;min-height:34px}
.notes-bar textarea:focus{outline:none;border-color:var(--fg)}

/* filter chips */
.filter-bar{display:none;flex-wrap:wrap;gap:6px;margin-bottom:14px;align-items:center;padding:10px 14px;background:var(--soft);border:1px solid var(--line);border-radius:6px}
.filter-group{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.filter-sep{width:1px;height:16px;background:var(--line);margin:0 4px}
.filter-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-right:3px;white-space:nowrap}
.chip{padding:3px 9px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:11px;color:var(--muted);cursor:pointer;font-family:inherit;white-space:nowrap}
.chip:hover{border-color:#999;color:var(--fg)}
.chip-active{background:var(--fg);color:#fff;border-color:var(--fg)}
.chip-clear{border-color:var(--warn);color:var(--warn);margin-left:4px}
.chip-clear:hover{background:var(--warn);color:#fff}

/* meta */
.meta{display:flex;flex-wrap:wrap;gap:20px;color:var(--muted);font-size:12px;padding:10px 14px;background:var(--soft);border:1px solid var(--line);border-radius:6px;margin-bottom:14px}
.meta strong{color:var(--fg);font-weight:600}

/* table groups */
.category{border:1px solid var(--line);border-radius:8px;margin-bottom:10px;overflow:hidden;background:#fff}
.cat-head{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;background:var(--soft);cursor:pointer;border-bottom:1px solid var(--line);user-select:none}
.cat-head:hover{background:#f3f3f3}
.cat-name{font-weight:600;font-size:13px}
.cat-meta{color:var(--muted);font-size:12px}
.chev{color:var(--muted);transition:transform .15s;display:inline-block}
.category.collapsed .chev{transform:rotate(-90deg)}
.category.collapsed table{display:none}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:6px 12px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
th{font-weight:500;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.6px;background:#fff}
tr:last-child td{border-bottom:none}
tbody tr.row{cursor:pointer}
tbody tr.row:hover{background:var(--hover)}
.row-done td:nth-child(2) .goal-name{text-decoration:line-through;color:var(--muted)}

/* status dot */
.status-dot{font-size:9px;cursor:default}
.s-idea{color:#9ca3af}.s-planning{color:#3b82f6}.s-inprogress{color:#f59e0b}.s-done{color:var(--accent)}.s-dropped{color:var(--warn)}

/* goal cell */
.goal-name{font-weight:500}
.goal-sub{display:block;font-size:11px;color:var(--muted);margin-top:1px}

/* type pills */
.tp{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.tp-buy{background:#f0f0f0;color:#111}
.tp-do{background:#dbeafe;color:#1d4ed8}
.tp-learn{background:#ede9fe;color:#5b21b6}
.tp-meet{background:#cffafe;color:#0e7490}
.tp-build{background:#fed7aa;color:#c2410c}
.tp-achieve{background:#fef3c7;color:#92400e}
.tp-visit{background:#d1fae5;color:#065f46}
.tp-routine{background:#f3f4f6;color:#6b7280}
.tp-earn{background:#dcfce7;color:#15803d}
.tp-review{background:#f0f9ff;color:#0369a1}

/* horizon pills */
.hp{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500;white-space:nowrap}
.hp-now{background:#fee2e2;color:#b03030}
.hp-soon{background:#fff7ed;color:#c2410c}
.hp-mid{background:#eff6ff;color:#1d4ed8}
.hp-long{background:#f5f3ff;color:#5b21b6}
.hp-vision{background:#f0fdf4;color:#065f46}

/* cost cell */
.cost-cell{color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap}

/* action buttons in table */
.act-buy{display:inline-block;padding:3px 10px;background:var(--fg);color:#fff;border-radius:4px;font-size:12px;text-decoration:none;white-space:nowrap}
.act-buy:hover{opacity:.85}
.act-plan{padding:3px 10px;border:1px solid var(--accent);color:var(--accent);background:#fff;border-radius:4px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.act-plan:hover{background:var(--accent);color:#fff}
.act-done{padding:3px 10px;border:1px solid var(--line);color:var(--muted);background:#fff;border-radius:4px;font-size:12px;cursor:pointer;font-family:inherit}

/* detail row */
tr.detail-row td{background:var(--soft);padding:12px 14px}
.vendor-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:6px}
.vendor-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 10px;background:#fff;border:1px solid var(--line);border-radius:4px;font-size:12px;text-decoration:none;color:var(--fg);transition:border-color .15s;gap:8px}
.vendor-row:hover{border-color:var(--fg)}
.vendor-row.best{border-color:var(--accent)}
.vendor-name{font-weight:500}
.vendor-sub{display:block;color:var(--muted);font-size:11px;margin-top:1px}
.vendor-price{white-space:nowrap;font-variant-numeric:tabular-nums;flex-shrink:0}
.badge{display:inline-block;background:var(--accent);color:#fff;padding:1px 5px;border-radius:3px;font-size:9px;margin-left:4px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;vertical-align:1px}
.badge.muted{background:#aaa}
.sources-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
.detail-aihelp{font-size:12px;color:var(--muted);margin-bottom:6px}
.detail-notes{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:8px}
.detail-placeholder{font-size:12px;color:var(--muted);padding:6px 0}
.detail-actions{display:flex;gap:6px;margin-top:10px}
.action-link{color:var(--muted);font-size:12px;border:1px solid var(--line);padding:3px 8px;border-radius:4px;cursor:pointer;background:none;font-family:inherit}
.action-link:hover{color:var(--fg);border-color:var(--fg)}
.action-link.danger:hover{color:var(--warn);border-color:var(--warn)}
.alt-queries{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.alt-label{font-size:11px;color:var(--muted);margin-right:4px}
.alt-tag{font-size:11px;padding:2px 7px;border-radius:4px;background:#f0f0f0;color:var(--muted);text-decoration:none}
.alt-tag:hover{background:#e0e0e0;color:var(--fg)}

/* steps */
.steps-list{display:flex;flex-direction:column;gap:5px;margin-top:4px}
.step-item{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:2px 0}
.step-item input[type=checkbox]{margin:0;cursor:pointer;width:14px;height:14px;flex-shrink:0}
.step-done{text-decoration:line-through;color:var(--muted)}

/* modals */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:50}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:8px;padding:22px;width:500px;max-width:94vw;max-height:90vh;overflow-y:auto}
.modal h3{margin-bottom:4px;font-size:15px}
.modal p.helper{color:var(--muted);font-size:12px;margin-bottom:14px}
.modal label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-top:12px;margin-bottom:4px}
.modal label:first-of-type{margin-top:0}
.modal input[type=text],.modal select,.modal textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit;background:#fff}
.modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:var(--fg)}
.modal textarea{resize:vertical;min-height:52px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.inf-goal{font-weight:600;font-size:14px;padding:10px 12px;background:var(--soft);border-radius:6px;border:1px solid var(--line);margin-bottom:14px;word-break:break-word}
.segment{display:flex;flex-wrap:wrap;gap:4px}
.seg-btn{padding:4px 10px;border:1px solid var(--line);border-radius:4px;background:#fff;font-size:12px;cursor:pointer;font-family:inherit}
.seg-btn:hover{border-color:#999}
.seg-btn.active{background:var(--fg);color:#fff;border-color:var(--fg)}

/* toast + loader + empty */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--fg);color:#fff;padding:8px 16px;border-radius:999px;font-size:12px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .2s;z-index:100}
.toast.show{opacity:1}
.loader{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{padding:40px;color:var(--muted);font-size:13px;text-align:center;border:1px dashed var(--line);border-radius:8px}

@media(max-width:720px){
  th:nth-child(3),td:nth-child(3),th:nth-child(4),td:nth-child(4),th:nth-child(5),td:nth-child(5){display:none}
  .add-bar{flex-wrap:wrap}
  .add-bar input[type=text]{flex-basis:100%}
  .modal-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <div class="logo">violate <small>goals tracker</small></div>
  <nav class="nav" id="navBar"></nav>
</header>

<!-- auth -->
<div id="authPage" class="auth-page" style="display:none">
  <h2 id="authTitle">Sign in</h2>
  <p class="sub">Your goals, tracked across every device.</p>
  <button class="btn-google" id="googleBtn">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.859-3.048.859-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
    Continue with Google
  </button>
  <div class="auth-divider">or</div>
  <div class="auth-form">
    <input type="email" id="authEmail" placeholder="Email" autocomplete="email" />
    <input type="password" id="authPassword" placeholder="Password" autocomplete="current-password" />
    <div class="auth-error" id="authError"></div>
    <button class="btn" id="authSubmit" style="width:100%">Sign in</button>
  </div>
  <div class="auth-toggle">
    <span id="authToggleText">Don't have an account?</span>
    <a id="authToggleLink"> Sign up</a>
  </div>
</div>

<!-- app -->
<main id="appMain" style="display:none">
  <div class="add-bar">
    <input type="text" id="q" placeholder="Add a goal — buy, do, learn, build, achieve, visit…" autocomplete="off" />
    <select id="qVertical" title="Vertical">
      <option value="">Vertical…</option>
      <option>Creator</option><option>Possessions</option><option>Experiences</option>
      <option>Skills</option><option>People</option><option>Businesses</option>
      <option>Properties</option><option>Memberships</option><option>Health</option>
      <option>Education</option><option>Career</option><option>Financial</option>
      <option>Daily OS</option><option>Edge</option>
    </select>
    <button class="btn" id="addBtn">Add</button>
    <button class="btn btn-ghost" id="bulkOpenBtn">Bulk</button>
  </div>
  <div class="notes-bar">
    <textarea id="notes" rows="1" placeholder="Notes — size, budget, occasion, deadline…"></textarea>
  </div>
  <div class="filter-bar" id="filterBar"></div>
  <div class="meta" id="metaBar" style="display:none"></div>
  <div id="goalsRoot"></div>
  <div id="empty" class="empty-state" style="display:none">No goals yet. Add your first one above.</div>
</main>

<!-- inference modal -->
<div class="modal-bg" id="inferenceModal">
  <div class="modal">
    <h3>Confirm goal</h3>
    <div class="inf-goal" id="infGoalText"></div>
    <div class="modal-grid">
      <div>
        <label>Type</label>
        <select id="infType">
          <option>Buy</option><option>Do</option><option>Learn</option><option>Meet</option>
          <option>Build</option><option>Achieve</option><option>Visit</option>
          <option>Routine</option><option>Earn</option><option>Review</option>
        </select>
      </div>
      <div>
        <label>Vertical</label>
        <select id="infVertical">
          <option>Creator</option><option>Possessions</option><option>Experiences</option>
          <option>Skills</option><option>People</option><option>Businesses</option>
          <option>Properties</option><option>Memberships</option><option>Health</option>
          <option>Education</option><option>Career</option><option>Financial</option>
          <option>Daily OS</option><option>Edge</option>
        </select>
      </div>
    </div>
    <label>Horizon</label>
    <div class="segment" id="infHorizonSeg">
      <button class="seg-btn" data-h="Now">Now &lt;1Y</button>
      <button class="seg-btn" data-h="Soon">Soon 1-3Y</button>
      <button class="seg-btn active" data-h="Mid">Mid 3-5Y</button>
      <button class="seg-btn" data-h="Long">Long 5-10Y</button>
      <button class="seg-btn" data-h="Vision">Vision 10Y+</button>
    </div>
    <input type="hidden" id="infHorizon" value="Mid">
    <div class="modal-grid">
      <div>
        <label>Cost estimate</label>
        <input type="text" id="infCost" placeholder="e.g. ₹50k–₹1.5L or varies" />
      </div>
      <div>
        <label>Status</label>
        <select id="infStatus">
          <option>Idea</option><option>Planning</option><option>InProgress</option><option>Done</option><option>Dropped</option>
        </select>
      </div>
    </div>
    <label>Notes</label>
    <textarea id="infNotes" rows="2"></textarea>
    <label>AI help</label>
    <input type="text" id="infAiHelp" placeholder="How AI helps achieve this goal" />
    <div class="modal-actions">
      <button class="btn btn-ghost" id="infCancelBtn">Cancel</button>
      <button class="btn" id="infConfirmBtn">Add goal →</button>
    </div>
  </div>
</div>

<!-- bulk add modal -->
<div class="modal-bg" id="bulkModal">
  <div class="modal">
    <h3>Bulk add goals</h3>
    <p class="helper">One goal per line. Append <code>:: Vertical</code> to override, e.g. <em>Scuba cert :: Skills</em></p>
    <textarea id="bulkText" rows="8" placeholder="Learn drift driving :: Skills&#10;Private island stay :: Experiences&#10;Macallan 18 :: Possessions&#10;Build a SaaS product"></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="bulkCancelBtn">Cancel</button>
      <button class="btn" id="bulkGoBtn">Add all</button>
    </div>
  </div>
</div>

<!-- edit modal -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3>Edit goal</h3>
    <label>Title</label>
    <input type="text" id="editName" />
    <label>Notes</label>
    <textarea id="editNotes" rows="2"></textarea>
    <div class="modal-grid">
      <div>
        <label>Type</label>
        <select id="editType">
          <option>Buy</option><option>Do</option><option>Learn</option><option>Meet</option>
          <option>Build</option><option>Achieve</option><option>Visit</option>
          <option>Routine</option><option>Earn</option><option>Review</option>
        </select>
      </div>
      <div>
        <label>Vertical</label>
        <select id="editVertical">
          <option>Creator</option><option>Possessions</option><option>Experiences</option>
          <option>Skills</option><option>People</option><option>Businesses</option>
          <option>Properties</option><option>Memberships</option><option>Health</option>
          <option>Education</option><option>Career</option><option>Financial</option>
          <option>Daily OS</option><option>Edge</option>
        </select>
      </div>
      <div>
        <label>Status</label>
        <select id="editStatus">
          <option>Idea</option><option>Planning</option><option>InProgress</option><option>Done</option><option>Dropped</option>
        </select>
      </div>
      <div>
        <label>Horizon</label>
        <select id="editHorizon">
          <option>Now</option><option>Soon</option><option>Mid</option><option>Long</option><option>Vision</option>
        </select>
      </div>
    </div>
    <label>Cost estimate</label>
    <input type="text" id="editCost" placeholder="e.g. ₹50k–₹1.5L" />
    <label>AI help note</label>
    <input type="text" id="editAiHelp" placeholder="How AI helps" />
    <div class="modal-actions">
      <button class="btn btn-ghost" id="editCancelBtn">Cancel</button>
      <button class="btn" id="editSaveBtn">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const TYPES     = ['Buy','Do','Learn','Meet','Build','Achieve','Visit','Routine','Earn','Review'];
const VERTICALS = ['Creator','Possessions','Experiences','Skills','People','Businesses','Properties','Memberships','Health','Education','Career','Financial','Daily OS','Edge'];
const HORIZONS  = ['Now','Soon','Mid','Long','Vision'];
const STATUSES  = ['Idea','Planning','InProgress','Done','Dropped'];

const VENDORS = {
  "Amazon":        q => `https://www.amazon.in/s?k=${encodeURIComponent(q)}`,
  "Flipkart":      q => `https://www.flipkart.com/search?q=${encodeURIComponent(q)}`,
  "Myntra":        q => `https://www.myntra.com/${encodeURIComponent(q.trim().replace(/\s+/g,"-").toLowerCase())}?rawQuery=${encodeURIComponent(q)}`,
  "Ajio":          q => `https://www.ajio.com/search/?text=${encodeURIComponent(q)}`,
  "Meesho":        q => `https://www.meesho.com/search?q=${encodeURIComponent(q)}`,
  "Nykaa Fashion": q => `https://www.nykaafashion.com/search/?q=${encodeURIComponent(q)}`
};
const VENDOR_ORDER = ["Amazon","Flipkart","Myntra","Ajio","Meesho","Nykaa Fashion"];

// ── INFERENCE ─────────────────────────────────────────────────────
function infer(query, notes="") {
  const t = (query+" "+notes).toLowerCase();

  let type = "Do";
  const TR = [
    [/\b(buy|get|own|purchase|collect|collection|luxury|diamond|watch|car|yacht|jet|gadget|laptop|phone|bottle|wine|whisky|scotch|bag|jewel)\b/, "Buy"],
    [/\b(learn|master|study|course|training|certification|coach|mentor|skill|practice|become)\b/, "Learn"],
    [/\b(meet|intro|network|connect|relationship|pitch to|talk to|coffee with|founder|celebrity)\b/, "Meet"],
    [/\b(build|launch|start|found|raise|venture|startup|business|product|saas|fund|raise)\b/, "Build"],
    [/\b(achieve|award|credential|exam|gmat|gre|mba|degree|rank|rating|milestone|1k|10k|clients)\b/, "Achieve"],
    [/\b(visit|travel|go to|explore|trip|bahamas|mongolia|countries|island|restaurant|city|country)\b/, "Visit"],
    [/\b(routine|habit|daily|weekly|streak|every day|meditation|workout|journal|sleep|fast)\b/, "Routine"],
    [/\b(earn|revenue|income|profit|salary|returns|crore|lakh|₹)\b/, "Earn"],
    [/\b(review|audit|analyze|assess|evaluate|quarterly|annual|rebalance)\b/, "Review"],
  ];
  for (const [re, v] of TR) { if (re.test(t)) { type=v; break; } }

  let vertical = "Experiences";
  const VR = [
    [/\b(content|video|reel|podcast|channel|brand|audience|creator|collab|followers)\b/, "Creator"],
    [/\b(watch|car|yacht|diamond|jewel|gadget|phone|laptop|luxury|fashion|bag|wine|whisky|scotch|collection)\b/, "Possessions"],
    [/\b(travel|trip|experience|diving|tank|parabolic|flight|island|beach|adventure|skydive|cuisine|event|concert)\b/, "Experiences"],
    [/\b(learn|skill|master|course|training|coach|mentor|practice|certification)\b/, "Skills"],
    [/\b(meet|network|connect|friend|relationship|people|intro|celebrity|founder)\b/, "People"],
    [/\b(business|startup|venture|raise|launch|company|product|saas|fund)\b/, "Businesses"],
    [/\b(property|real estate|house|apartment|land|invest in real)\b/, "Properties"],
    [/\b(club|membership|tier|lounge|black card|invite only|access)\b/, "Memberships"],
    [/\b(health|fitness|gym|workout|stem cell|therapy|wellness|biohack|fast|sleep|body)\b/, "Health"],
    [/\b(degree|mba|university|school|exam|gmat|gre|education)\b/, "Education"],
    [/\b(job|career|promotion|hire|salary|work|role|cxo|ceo|cto|leadership)\b/, "Career"],
    [/\b(invest|portfolio|stock|crypto|returns|wealth|fund|financial|dividend)\b/, "Financial"],
    [/\b(routine|habit|daily|morning|sleep|journal|meditation|system|os)\b/, "Daily OS"],
    [/\b(edge|competitive|advantage|unfair|leverage|secret|asymmetr)\b/, "Edge"],
  ];
  for (const [re, v] of VR) { if (re.test(t)) { vertical=v; break; } }

  let horizon = "Soon";
  if (/\b(this (week|month)|now|asap|urgent|immediate)\b/.test(t))         horizon="Now";
  else if (/\b(this year|next year|within a year|0-1Y|short.?term)\b/.test(t)) horizon="Now";
  else if (/\b(1-3Y|1 to 3|near.?term)\b/.test(t))                          horizon="Soon";
  else if (/\b(3-5Y|3 to 5|five years|mid.?term)\b/.test(t))                horizon="Mid";
  else if (/\b(5-10Y|5 to 10|decade|long.?term)\b/.test(t))                 horizon="Long";
  else if (/\b(10Y\+|10 years|life.?goal|someday|vision)\b/.test(t))        horizon="Vision";

  return { type, vertical, horizon };
}

// ── SESSION ────────────────────────────────────────────────────────
let accessToken=null, refreshToken=null, currentUser=null;

function authH(extra={}) {
  return {"apikey":SUPABASE_ANON,"Authorization":`Bearer ${accessToken||SUPABASE_ANON}`,"Content-Type":"application/json","Prefer":"return=representation",...extra};
}
async function gotruePost(ep, body) {
  const r = await fetch(`${SUPABASE_URL}/auth/v1${ep}`,{method:"POST",headers:{"apikey":SUPABASE_ANON,"Content-Type":"application/json"},body:JSON.stringify(body)});
  const d = await r.json();
  if (!r.ok) throw new Error(d.error_description||d.msg||d.error||"Auth error");
  return d;
}
async function getUser(token) {
  const r = await fetch(`${SUPABASE_URL}/auth/v1/user`,{headers:{"apikey":SUPABASE_ANON,"Authorization":`Bearer ${token}`}});
  if (!r.ok) throw new Error("Could not fetch user");
  return r.json();
}
function setSession(d) {
  accessToken=d.access_token; refreshToken=d.refresh_token; currentUser=d.user;
  localStorage.setItem("violate.session",JSON.stringify({accessToken,refreshToken,user:currentUser}));
}
function clearSession() { accessToken=refreshToken=currentUser=null; localStorage.removeItem("violate.session"); }
function loadSession() {
  try { const s=JSON.parse(localStorage.getItem("violate.session")||"null"); if(s?.accessToken){accessToken=s.accessToken;refreshToken=s.refreshToken;currentUser=s.user;return true;} } catch{}
  return false;
}
async function tryRefresh() {
  if (!refreshToken) return false;
  try { setSession(await gotruePost("/token?grant_type=refresh_token",{refresh_token:refreshToken})); return true; }
  catch { clearSession(); return false; }
}

// ── SUPABASE REST ─────────────────────────────────────────────────
async function sbFetch(path, opts={}) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1${path}`,{...opts,headers:authH(opts.headers||{})});
  if (!r.ok) {
    const txt = await r.text();
    if (r.status===401) { if (await tryRefresh()) return sbFetch(path,opts); throw new Error("session_expired"); }
    throw new Error(`Supabase ${r.status}: ${txt}`);
  }
  if (r.status===204) return null;
  return r.json();
}
const sbList   = ()      => sbFetch(`/goals?user_id=eq.${currentUser.id}&order=created_at.desc&limit=1000`);
const sbInsert = row     => sbFetch(`/goals`,{method:"POST",body:JSON.stringify(row)});
const sbDelete = id      => sbFetch(`/goals?id=eq.${encodeURIComponent(id)}`,{method:"DELETE"});
const sbPatch  = (id, p) => sbFetch(`/goals?id=eq.${encodeURIComponent(id)}`,{method:"PATCH",body:JSON.stringify(p)});

// ── AI ─────────────────────────────────────────────────────────────
async function aiSuggest(query, notes) {
  const r = await fetch(SUGGEST_EP,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({query,notes})});
  if (!r.ok) throw new Error(`AI ${r.status}: ${await r.text()}`);
  return r.json();
}

// ── SOURCES ────────────────────────────────────────────────────────
let sourcesData = {};
async function loadSources() {
  try { const r=await fetch("/data/sources.json"); if(r.ok) sourcesData=await r.json(); } catch{}
}
function getSources(goalTitle) {
  const name = (goalTitle||"").toLowerCase().trim();
  const key  = Object.keys(sourcesData).find(k =>
    k.toLowerCase()===name ||
    name.includes(k.toLowerCase()) ||
    k.toLowerCase().includes(name) ||
    name.split(" ").filter(w=>w.length>4).some(w=>k.toLowerCase().includes(w))
  );
  return key ? sourcesData[key] : null;
}

// ── STATE ──────────────────────────────────────────────────────────
let items     = [];
let collapsed = {};
let filters   = {type:[],vertical:[],horizon:[],status:[]};

// ── FILTER URL ────────────────────────────────────────────────────
function readFilters() {
  const p = new URLSearchParams(window.location.search);
  filters = {
    type:     (p.get("type")||"").split(",").filter(Boolean),
    vertical: (p.get("vertical")||"").split(",").filter(Boolean),
    horizon:  (p.get("horizon")||"").split(",").filter(Boolean),
    status:   (p.get("status")||"").split(",").filter(Boolean),
  };
}
function writeFilters() {
  const p=new URLSearchParams();
  if(filters.type.length)     p.set("type",    filters.type.join(","));
  if(filters.vertical.length) p.set("vertical",filters.vertical.join(","));
  if(filters.horizon.length)  p.set("horizon", filters.horizon.join(","));
  if(filters.status.length)   p.set("status",  filters.status.join(","));
  const qs=p.toString();
  history.replaceState(null,"",qs?"?"+qs:window.location.pathname);
}
function toggleFilter(key, val) {
  const arr=filters[key], idx=arr.indexOf(val);
  if(idx===-1) arr.push(val); else arr.splice(idx,1);
  writeFilters(); render();
}
function clearFilters() { filters={type:[],vertical:[],horizon:[],status:[]}; writeFilters(); render(); }

function applyFilters(list) {
  return list.filter(i => {
    if(filters.type.length     && !filters.type.includes(i.type||"Do"))          return false;
    if(filters.vertical.length && !filters.vertical.includes(i.vertical||"Experiences")) return false;
    if(filters.horizon.length  && !filters.horizon.includes(i.horizon||"Soon"))  return false;
    if(filters.status.length   && !filters.status.includes(i.status||"Idea"))    return false;
    return true;
  });
}

// ── HELPERS ────────────────────────────────────────────────────────
const $   = id => document.getElementById(id);
const esc = s  => String(s||"").replace(/[<>&"']/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;","\"":"&quot;","'":"&#39;"}[c]));
const fmt = n  => "₹"+Number(n||0).toLocaleString("en-IN");

function toast(msg) {
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove("show"),2400);
}

function statusClass(s) {
  return {Idea:"s-idea",Planning:"s-planning",InProgress:"s-inprogress",Done:"s-done",Dropped:"s-dropped"}[s]||"s-idea";
}

function vendorLinks(item) {
  const q = item.ai?.name||item.query||"";
  const ranked = (item.ai?.bestVendors||[]).filter(v=>VENDORS[v]);
  const rest   = VENDOR_ORDER.filter(v=>!ranked.includes(v));
  return [...ranked,...rest].map(v=>({name:v,url:VENDORS[v](q),recommended:ranked.includes(v)}));
}

function groupByVertical(list) {
  const map={};
  list.forEach(i=>{ const v=i.vertical||"Experiences"; (map[v]=map[v]||[]).push(i); });
  return Object.entries(map).sort(([a],[b])=>a.localeCompare(b));
}

    else setSession(await gotruePost("/token?grant_type=password",{email,password:pass}));
    showApp(); bootstrap();
  } catch(e){$("authError").textContent=e.message;} finally{btn.disabled=false;}
};

$("authEmail").onkeydown=e=>{if(e.key==="Enter")$("authPassword").focus();};

// ── RENDER FILTER CHIPS ───────────────────────────────────────────
function renderFilterChips() {
  const el=$("filterBar");
  if(!items.length){el.style.display="none";return;}

  const usedTypes  =[...new Set(items.map(i=>i.type||"Do"))].sort();
  const usedVerts  =[...new Set(items.map(i=>i.vertical||"Experiences"))].sort();
  const usedHors   =HORIZONS.filter(h=>items.some(i=>(i.horizon||"Soon")===h));
  const usedStats  =STATUSES.filter(s=>items.some(i=>(i.status||"Idea")===s));
  const hasActive  =Object.values(filters).some(a=>a.length);

  let h="";
  const chips=(arr,key)=>arr.map(v=>`<button class="chip${filters[key].includes(v)?" chip-active":""}" data-fk="${key}" data-fv="${esc(v)}">${esc(v)}</button>`).join("");

  h+=`<div class="filter-group"><span class="filter-label">Type</span>${chips(usedTypes,"type")}</div>`;
  h+=`<div class="filter-sep"></div>`;
  h+=`<div class="filter-group"><span class="filter-label">Vertical</span>${chips(usedVerts,"vertical")}</div>`;
  h+=`<div class="filter-sep"></div>`;
  h+=`<div class="filter-group"><span class="filter-label">Horizon</span>${chips(usedHors,"horizon")}</div>`;
  h+=`<div class="filter-sep"></div>`;
  h+=`<div class="filter-group"><span class="filter-label">Status</span>${chips(usedStats,"status")}</div>`;
  if(hasActive) h+=`<button class="chip chip-clear" id="clearFiltersBtn">Clear</button>`;

  el.innerHTML=h;
  el.style.display="flex";
  el.querySelectorAll("[data-fk]").forEach(b=>b.onclick=()=>toggleFilter(b.dataset.fk,b.dataset.fv));
  if(hasActive) $("clearFiltersBtn").onclick=clearFilters;
}

// ── RENDER META ────────────────────────────────────────────────────
function renderMeta() {
  const bar=$("metaBar");
  if(!items.length){bar.style.display="none";return;}
  bar.style.display="flex";
  const verts=[...new Set(items.map(i=>i.vertical||"Experiences"))].length;
  const done =items.filter(i=>i.status==="Done").length;
  const types=[...new Set(items.map(i=>i.type||"Do"))].length;
  bar.innerHTML=`<span><strong>${items.length}</strong> goals</span><span>across <strong>${verts}</strong> verticals</span><span><strong>${types}</strong> types</span><span><strong>${done}</strong> done</span>`;
}

// ── RENDER DETAIL ──────────────────────────────────────────────────
function renderDetailHTML(item) {
  const type    = item.type||"Do";
  const name    = item.ai?.name||item.query;
  const sources = getSources(name)||getSources(item.query);
  let h="";

  if(item.ai_help_note) h+=`<div class="detail-aihelp">🤖 ${esc(item.ai_help_note)}</div>`;
  if(item.notes)        h+=`<div class="detail-notes">"${esc(item.notes)}"</div>`;

  if(type==="Buy" && item.ai?.bestVendors?.length) {
    h+=`<div class="vendor-list">`;
    vendorLinks(item).forEach(v=>{
      h+=`<a class="vendor-row${v.recommended?" best":""}" href="${v.url}" target="_blank" rel="noopener">
        <span><span class="vendor-name">${v.name}</span>${v.recommended?` <span class="badge">best</span>`:""}</span>
        <span>→</span></a>`;
    });
    h+=`</div>`;
    const alts=(item.ai?.alternateQueries||[]).slice(0,3);
    if(alts.length){
      h+=`<div class="alt-queries"><span class="alt-label">Try also:</span>`;
      alts.forEach(q=>h+=`<a class="alt-tag" href="${VENDORS["Amazon"](q)}" target="_blank" rel="noopener">${esc(q)}</a>`);
      h+=`</div>`;
    }
  } else if(["Do","Learn","Visit"].includes(type) && sources) {
    h+=`<div class="sources-label">Operators &amp; providers</div><div class="vendor-list">`;
    sources.forEach(s=>{
      const price = s.price_inr ? fmt(s.price_inr) : "";
      const tag   = s.url ? `a href="${s.url}" target="_blank" rel="noopener"` : "div";
      const close = s.url ? "a" : "div";
      h+=`<${tag} class="vendor-row${s.best?" best":""}">
        <span>
          <span class="vendor-name">${esc(s.name)}${s.best?` <span class="badge">best</span>`:""}</span>
          <span class="vendor-sub">${esc(s.location||"")}${s.description?" · "+esc(s.description.substring(0,55))+"…":""}</span>
        </span>
        <span class="vendor-price">${price}${s.url?" →":""}</span>
      </${close}>`;
    });
    h+=`</div>`;
  } else if(["Build","Achieve"].includes(type)) {
    const steps=item.steps||[];
    if(steps.length){
      h+=`<div class="steps-list">`;
      steps.forEach((s,i)=>{
        h+=`<label class="step-item">
          <input type="checkbox" ${s.done?"checked":""} data-step="${item.id}" data-idx="${i}">
          <span class="${s.done?"step-done":""}">Step ${i+1}: ${esc(s.text)}</span>
        </label>`;
      });
      h+=`</div>`;
    } else {
      h+=`<div class="detail-placeholder">No steps yet — edit to add a checklist.</div>`;
    }
  } else if(type==="Meet") {
    h+=`<div class="detail-placeholder">Add intro path in notes. Outreach tracking coming soon.</div>`;
  } else if(type==="Routine") {
    h+=`<div class="detail-placeholder">Streak tracking coming soon.</div>`;
  } else {
    h+=`<div class="detail-placeholder">No operator data for this goal yet.</div>`;
  }

  h+=`<div class="detail-actions">
    <button class="action-link" data-edit="${item.id}">Edit</button>
    <button class="action-link" data-refresh="${item.id}">Re-suggest</button>
    <button class="action-link danger" data-delete="${item.id}">Delete</button>
  </div>`;
  return h;
}

// ── RENDER ─────────────────────────────────────────────────────────
function render() {
  renderFilterChips();
  renderMeta();
  const root=$("goalsRoot");
  root.innerHTML="";
  const visible=applyFilters(items);
  $("empty").style.display=visible.length?"none":"block";
  if(!visible.length) return;

  groupByVertical(visible).forEach(([vertName,groupItems],gi)=>{
    const sec=document.createElement("div");
    sec.className="category"+(collapsed[vertName]?" collapsed":"");

    const rows=groupItems.map((item,ii)=>{
      const type    =item.type||"Do";
      const horizon =item.horizon||"Soon";
      const status  =item.status||"Idea";
      const name    =item.ai?.name||item.query;
      const did     =`d-${gi}-${ii}`;

      const costStr = item.cost_estimate||
        (item.ai?.priceRange?.min&&item.ai.priceRange.min>0
          ? fmt(item.ai.priceRange.min)+(item.ai.priceRange.max>item.ai.priceRange.min?"+":"")
          : "");

      let action;
      if(status==="Done") {
        action=`<button class="act-done">✓ Done</button>`;
      } else if(type==="Buy" && item.ai?.bestVendors?.length) {
        const q=encodeURIComponent(name);
        const url=VENDORS[item.ai.bestVendors[0]]?.(name)||"#";
        action=`<a class="act-buy" href="${url}" target="_blank" rel="noopener">Buy →</a>`;
      } else {
        action=`<button class="act-plan" data-plan="${item.id}">Plan →</button>`;
      }

      return `<tr class="row${status==="Done"?" row-done":""}" data-detail="${did}">
        <td class="status-cell"><span class="status-dot ${statusClass(status)}" title="${status}">●</span></td>
        <td>
          <span class="goal-name">${esc(name)}</span>
          ${item.subcategory?`<span class="goal-sub">${esc(item.subcategory)}</span>`:""}
        </td>
        <td><span class="tp tp-${type.toLowerCase()}">${type}</span></td>
        <td><span class="hp hp-${horizon.toLowerCase()}">${horizon}</span></td>
        <td class="cost-cell">${esc(costStr)}</td>
        <td style="text-align:right">${action}</td>
      </tr>
      <tr class="detail-row" id="${did}" style="display:none">
        <td colspan="6" style="padding:12px 14px;background:var(--soft)">${renderDetailHTML(item)}</td>
      </tr>`;
    }).join("");

    sec.innerHTML=`<div class="cat-head">
      <div><span class="chev">▾</span>
        <span class="cat-name" style="margin-left:6px">${esc(vertName)}</span>
        <span class="cat-meta"> · ${groupItems.length} goal${groupItems.length!==1?"s":""}</span>
      </div>
    </div>
    <table>
      <thead><tr>
        <th style="width:20px"></th>
        <th>Goal</th>
        <th style="width:80px">Type</th>
        <th style="width:80px">Horizon</th>
        <th style="width:110px">Cost</th>
        <th style="width:90px"></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

    sec.querySelector(".cat-head").onclick=()=>{ collapsed[vertName]=!collapsed[vertName]; sec.classList.toggle("collapsed"); };
    root.appendChild(sec);
  });
}

    const tr=plan.closest("tr");
    if(tr){const dd=tr.dataset.detail;const el=document.getElementById(dd);if(el)el.style.display=el.style.display==="table-row"?"none":"table-row";}
    return;
  }
  if(edit)   { e.stopPropagation(); const it=items.find(i=>i.id===edit.dataset.edit);   if(it) openEdit(it);    return; }
  if(refresh){ e.stopPropagation(); const it=items.find(i=>i.id===refresh.dataset.refresh); if(it) refreshItem(it); return; }
  if(del)    { e.stopPropagation(); const it=items.find(i=>i.id===del.dataset.delete);   if(it) removeItem(it);  return; }
  if(step    && e.target.tagName==="INPUT") { e.stopPropagation(); toggleStep(step.dataset.step,+step.dataset.idx,e.target.checked); return; }
  if(row) {
    const d=document.getElementById(row.dataset.detail);
    if(d) d.style.display=d.style.display==="table-row"?"none":"table-row";
  }
});

// ── INFERENCE MODAL ────────────────────────────────────────────────
let pendingGoal=null;

// Horizon segment buttons
$("inferenceModal").querySelectorAll(".seg-btn").forEach(btn=>{
  btn.onclick=()=>{
    $("inferenceModal").querySelectorAll(".seg-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    $("infHorizon").value=btn.dataset.h;
  };
});

function openInferenceModal(query, notes, aiResult) {
  const rules  =infer(query, notes);
  const type   =aiResult?.inferredType    ||rules.type;
  const vertical=aiResult?.inferredVertical||rules.vertical;
  const horizon =aiResult?.inferredHorizon ||rules.horizon;
  const cost   =aiResult?.priceRange?.min&&aiResult.priceRange.min>0
    ? `${fmt(aiResult.priceRange.min)} – ${fmt(aiResult.priceRange.max)}`
    : "";

  pendingGoal={query,notes,aiResult};
  $("infGoalText").textContent=query;
  $("infType").value      =type;
  $("infVertical").value  =vertical;
  $("infHorizon").value   =horizon;
  $("infCost").value      =cost;
  $("infNotes").value     =notes||"";
  $("infAiHelp").value    =aiResult?.aiHelpNote||"";
  $("infStatus").value    ="Idea";

  // Update segment buttons
  $("inferenceModal").querySelectorAll(".seg-btn").forEach(b=>{
    b.classList.toggle("active",b.dataset.h===horizon);
  });
  $("inferenceModal").classList.add("show");
}

$("infCancelBtn").onclick=()=>{ $("inferenceModal").classList.remove("show"); pendingGoal=null; };
$("infConfirmBtn").onclick=confirmGoal;

async function confirmGoal() {
  if(!pendingGoal) return;
  const {query, aiResult}=pendingGoal;
  const type    =$("infType").value;
  const vertical=$("infVertical").value;
  const horizon =$("infHorizon").value;
  const cost    =$("infCost").value.trim();
  const notes   =$("infNotes").value.trim();
  const aiHelp  =$("infAiHelp").value.trim();
  const status  =$("infStatus").value;

  const localId=crypto.randomUUID();
  const localItem={
    id:localId, user_id:currentUser.id, query, notes:notes||null,
    _v:2, type, vertical, subcategory:null, status, horizon,
    cost_estimate:cost||null, ai_help_note:aiHelp||null,
    ai: type==="Buy" ? aiResult : null,
    sources:null, steps:null,
    created_at:new Date().toISOString(),
  };

  items.unshift(localItem);
  $("inferenceModal").classList.remove("show");
  pendingGoal=null;
  $("q").value=""; $("notes").value="";
  render(); toast("Added");

  const {id:_,created_at:__,...row}=localItem;
  sbInsert(row).then(ins=>{
    if(ins?.[0]){const idx=items.findIndex(i=>i.id===localId);if(idx!==-1)items[idx]=ins[0];}
  }).catch(e=>console.error("Insert failed:",e));
}

// ── ADD ITEM ───────────────────────────────────────────────────────
async function addItem() {
  const query=$("q").value.trim();
  const notes=$("notes").value.trim();
  if(!query) return;
  const btn=$("addBtn"); btn.disabled=true; btn.innerHTML='<span class="loader"></span>Thinking';

  let aiResult=null;
  try { aiResult=await aiSuggest(query,notes); }
  catch(e) { console.warn("AI failed, using rules:",e.message); }

  btn.disabled=false; btn.textContent="Add";
  openInferenceModal(query,notes,aiResult);
}

// ── REMOVE / REFRESH / STEP ────────────────────────────────────────
async function removeItem(item) {
  items=items.filter(i=>i.id!==item.id); render();
  try { await sbDelete(item.id); } catch(e){console.error(e);}
  toast("Removed");
}

async function refreshItem(item) {
  toast("Re-running AI…");
  try {
    const ai=await aiSuggest(item.query,item.notes||"");
    item.ai=ai; item.ai_help_note=ai.aiHelpNote||item.ai_help_note;
    render();
    try { await sbPatch(item.id,{ai,ai_help_note:item.ai_help_note}); } catch(e){console.error(e);}
    toast("Updated");
  } catch(e){toast("Failed: "+e.message);}
}

async function toggleStep(itemId, idx, done) {
  const item=items.find(i=>i.id===itemId); if(!item) return;
  item.steps=item.steps||[];
  if(item.steps[idx]) item.steps[idx].done=done;
  try { await sbPatch(item.id,{steps:item.steps}); } catch(e){console.error(e);}
}

// ── BULK ADD ───────────────────────────────────────────────────────
$("bulkOpenBtn").onclick=()=>$("bulkModal").classList.add("show");
$("bulkCancelBtn").onclick=()=>$("bulkModal").classList.remove("show");
$("bulkGoBtn").onclick=async()=>{
  const lines=$("bulkText").value.split("\n").map(l=>l.trim()).filter(Boolean);
  if(!lines.length) return;
  const btn=$("bulkGoBtn"); btn.disabled=true; btn.innerHTML='<span class="loader"></span>Working';
  for(const line of lines){
    // parse "goal :: Vertical"
    const [rawGoal,rawVert]=line.split("::").map(s=>s.trim());
    const overrideVert=VERTICALS.includes(rawVert)?rawVert:null;
    try {
      let aiResult=null;
      try { aiResult=await aiSuggest(rawGoal,""); } catch{}
      const rules=infer(rawGoal,"");
      const type    =aiResult?.inferredType    ||rules.type;
      const vertical=overrideVert||aiResult?.inferredVertical||rules.vertical;
      const horizon =aiResult?.inferredHorizon ||rules.horizon;
      const localId =crypto.randomUUID();
      const localItem={
        id:localId,user_id:currentUser.id,query:rawGoal,notes:null,_v:2,
        type,vertical,subcategory:null,status:"Idea",horizon,
        cost_estimate:aiResult?.priceRange?.min&&aiResult.priceRange.min>0?`${fmt(aiResult.priceRange.min)} – ${fmt(aiResult.priceRange.max)}`:null,
        ai_help_note:aiResult?.aiHelpNote||null,
        ai:type==="Buy"?aiResult:null,
        sources:null,steps:null,created_at:new Date().toISOString(),
      };
      items.unshift(localItem);
      render();
      const {id:_,created_at:__,...row}=localItem;
      sbInsert(row).then(ins=>{if(ins?.[0]){const idx=items.findIndex(i=>i.id===localId);if(idx!==-1)items[idx]=ins[0];}}).catch(console.error);
    } catch(e){console.error("Bulk failed:",rawGoal,e);}
  }
  btn.disabled=false; btn.textContent="Add all";
  $("bulkText").value="";
  $("bulkModal").classList.remove("show");
  toast(`Added ${lines.length} goals`);
};

// ── EDIT ───────────────────────────────────────────────────────────
let editingItem=null;
function openEdit(item) {
  editingItem=item;
  $("editName").value    =item.ai?.name||item.query||"";
  $("editNotes").value   =item.notes||"";
  $("editType").value    =item.type||"Do";
  $("editVertical").value=item.vertical||"Experiences";
  $("editStatus").value  =item.status||"Idea";
  $("editHorizon").value =item.horizon||"Soon";
  $("editCost").value    =item.cost_estimate||"";
  $("editAiHelp").value  =item.ai_help_note||"";
  $("editModal").classList.add("show");
}
$("editCancelBtn").onclick=()=>{ $("editModal").classList.remove("show"); editingItem=null; };
$("editSaveBtn").onclick=async()=>{
  if(!editingItem) return;
  const btn=$("editSaveBtn"); btn.disabled=true;
  const name    =$("editName").value.trim();
  const notes   =$("editNotes").value.trim();
  const type    =$("editType").value;
  const vertical=$("editVertical").value;
  const status  =$("editStatus").value;
  const horizon =$("editHorizon").value;
  const cost    =$("editCost").value.trim();
  const aiHelp  =$("editAiHelp").value.trim();

  editingItem.notes        =notes||null;
  editingItem.type         =type;
  editingItem.vertical     =vertical;
  editingItem.status       =status;
  editingItem.horizon      =horizon;
  editingItem.cost_estimate=cost||null;
  editingItem.ai_help_note =aiHelp||null;
  if(editingItem.ai) editingItem.ai.name=name||editingItem.query;
  else if(name)      editingItem.query=name;

  try {
    await sbPatch(editingItem.id,{
      notes:editingItem.notes,type,vertical,status,horizon,
      cost_estimate:editingItem.cost_estimate,ai_help_note:editingItem.ai_help_note,
      ai:editingItem.ai
    });
  } catch(e){console.error(e);}

  $("editModal").classList.remove("show");
  render(); toast("Saved"); btn.disabled=false; editingItem=null;
};

// ── BOOTSTRAP ──────────────────────────────────────────────────────
async function bootstrap() {
  await loadSources();
  try {
    const cloud=await sbList();
    if(Array.isArray(cloud)){ items=cloud; render(); }
  } catch(e) {
    if(e.message==="session_expired"){ clearSession(); showAuth(); toast("Session expired. Sign in again."); }
    else console.error(e);
  }
}

// ── ADD BAR BINDINGS ───────────────────────────────────────────────
$("addBtn").onclick=addItem;
$("q").onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();addItem();}};

// ── INIT ───────────────────────────────────────────────────────────
readFilters();

async function init() {
  const hash  =window.location.hash.slice(1);
  const params=new URLSearchParams(hash);
  const at    =params.get("access_token");
  const rt    =params.get("refresh_token");
  if(at) {
    window.history.replaceState(null,"",window.location.pathname+(window.location.search||""));
    try {
      const user=await getUser(at);
      setSession({access_token:at,refresh_token:rt,user});
      showApp(); bootstrap();
    } catch(e){ showAuth(); }
    return;
  }
  if(loadSession()){ showApp(); bootstrap(); }
  else showAuth();
}
init();
</script>
